name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned dependencies
        run: pip install --require-hashes -r requirements-dev.txt
      - name: Ruff
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tooling
        run: pip install pip-audit
      - name: pip-audit (runtime + dev lockfiles)
        run: pip-audit --strict -r requirements.txt -r requirements-dev.txt
      - name: Install security-gate (SHA-pinned)
        run: pip install "git+https://github.com/LeightonSec/security-gate.git@c52a8b56b3e164f9854c646bedb5d9e70446d98e"
      - name: Security gate
        run: security-gate scan .
